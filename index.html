header{padding:12px 16px;border-bottom:1px solid var(--soft);position:sticky;top:0;background:var(--bg);z-index:5}
h1{font-size:17px;margin:0 0 10px}
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tabs button{flex:1;padding:8px;border:0;border-radius:10px;background:var(--card);color:var(--txt);font-size:14px;cursor:pointer}
.tabs button.on{background:var(--accent);color:#04263a;font-weight:700}
.levels{display:flex;gap:6px;flex-wrap:wrap}
.levels button{padding:5px 11px;border:0;border-radius:20px;background:var(--card);color:var(--txt);font-size:13px;cursor:pointer}
.levels button.on{outline:2px solid var(--accent)}
.wrap{max-width:640px;margin:0 auto;padding:16px}
.counts{display:flex;gap:14px;justify-content:center;font-size:13px;margin-bottom:12px}
.counts b{font-size:16px}.counts .n{color:#38bdf8}.counts .lrn{color:#f97316}.counts .rev{color:#22c55e}
.flash{background:var(--card);border-radius:18px;padding:32px 20px;text-align:center;min-height:220px;
 display:flex;flex-direction:column;justify-content:center;cursor:pointer;user-select:none;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.word{font-size:38px;font-weight:800}
.badge{display:inline-block;margin-top:12px;font-size:12px;font-weight:700;color:#08131f;border-radius:20px;padding:3px 12px}
.mean{font-size:27px;color:var(--accent);margin-top:6px}.meta{font-size:12px;color:var(--mut);margin-top:10px}
.hint{font-size:12px;color:var(--mut);margin-top:16px}
.btns4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.btns4 button{padding:12px 4px;border:0;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:#fff;line-height:1.25}
.btns4 small{display:block;font-weight:500;font-size:11px;opacity:.9}
.again{background:#ef4444}.hard{background:#f59e0b;color:#3b1e00}.good{background:#22c55e;color:#052e12}.easy{background:#38bdf8;color:#04263a}
.flip{grid-column:1/5;background:var(--soft);color:var(--txt)}
.done{text-align:center;padding:36px 16px;color:var(--mut)}
.search{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--soft);background:var(--card);color:var(--txt);font-size:15px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:14px}td{padding:7px 8px;border-bottom:1px solid var(--soft)}td.w{font-weight:700}
.lv{font-size:11px;font-weight:700;border-radius:6px;padding:1px 7px;color:#08131f}
.row2{display:flex;gap:8px;align-items:center;justify-content:center;font-size:13px;color:var(--mut);margin-top:14px;flex-wrap:wrap}
.row2 input{width:58px;padding:4px 6px;border-radius:8px;border:1px solid var(--soft);background:var(--card);color:var(--txt)}
.seg button{border:1px solid var(--soft);background:var(--card);color:var(--mut);padding:4px 10px;font-size:12px;cursor:pointer}
.seg button.on{background:var(--accent);color:#04263a;font-weight:700;border-color:var(--accent)}
.seg button:first-child{border-radius:8px 0 0 8px}.seg button:last-child{border-radius:0 8px 8px 0}
.reset{background:none;border:1px solid var(--soft);color:var(--mut);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
.ain{width:120px;padding:5px 8px;border-radius:8px;border:1px solid var(--soft);background:var(--card);color:var(--txt);font-size:13px;margin-right:4px}
</style>

function setLevel(l){level=l;document.querySelectorAll('#levels button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));build()}
function setTab(t){tab=t;for(const[id,tb]of[['tStudy','study'],['tStats','stats'],['tList','list']])document.getElementById(id).classList.toggle('on',tb===t);
 document.getElementById('study').style.display=t==='study'?'':'none';document.getElementById('stats').style.display=t==='stats'?'':'none';document.getElementById('list').style.display=t==='list'?'':'none';build()}
function pool(){return DATA.filter(d=>level==='ALL'||d.l===level)}
function st(w){return prog[w]}
function isNew(d){const s=st(d.w);return !s||s.ph==='new'||s.ph===undefined}
function queue(){rollover();const now=Date.now();const p=pool();if(extra){const seen=p.filter(d=>{const s=st(d.w);return s&&s.ph!=='new';}).sort((a,b)=>st(a.w).due-st(b.w).due);const news=p.filter(isNew);return{learn:[],rev:[],news:news,q:[...seen,...news]};}
 const learn=p.filter(d=>{const s=st(d.w);return s&&(s.ph==='learning'||s.ph==='relearning')&&s.due<=now}).sort((a,b)=>st(a.w).due-st(b.w).due);
 const rev=p.filter(d=>{const s=st(d.w);return s&&s.ph==='review'&&s.due<=now}).sort((a,b)=>st(a.w).due-st(b.w).due);
 let left=Math.max(0,meta.newLimit-meta.newCount);
 const news=p.filter(isNew).slice(0,left);
 return {learn,rev,news,q:[...learn,...rev,...news]};}
function build(){const {learn,rev,news}=queue();
 document.getElementById('counts').innerHTML=(extra?`<span style="color:#38bdf8">⚡ Ekstra çalışma</span>`:``)+`<span class="n"><b>${news.length}</b> yeni</span><span class="lrn"><b>${learn.length}</b> öğrenme</span><span class="rev"><b>${rev.length}</b> tekrar</span>`;
 if(tab==='study')buildStudy();else if(tab==='stats')buildStats();else buildList(pool());}
function fmt(ms){if(ms<MIN*60)return Math.max(1,Math.round(ms/MIN))+'dk';if(ms<D)return Math.round(ms/(MIN*60))+'sa';return Math.round(ms/D)+'g';}
function preview(s){const now=Date.now();
 if(meta.algo==='fsrs'){
   if(!s||s.ph==='new'||s.S===undefined)return [10*MIN,fI(fS0(2))*D,fI(fS0(3))*D,fI(fS0(4))*D];
   const t=Math.max(0,(now-(s.last||now))/D),r=fR(t,s.S);
   return [10*MIN,fI(fSs(s.D,s.S,r,2))*D,fI(fSs(s.D,s.S,r,3))*D,fI(fSs(s.D,s.S,r,4))*D];
 } else {
   s=s||{ph:'new',ease:2.5,iv:0,step:0};const ph=(s.ease===undefined)?'new':s.ph;
   if(ph==='new'||ph==='learning'||ph==='relearning'){const steps=ph==='relearning'?RELEARN:LEARN;let step=s.step||0;
     const ni=step+1;const good=ni>=steps.length?GRAD*D:steps[ni]*MIN;return [steps[0]*MIN,steps[step]*MIN,good,EASY_GRAD*D];}
   const ease=s.ease||2.5,iv=s.iv||1;return [RELEARN[0]*MIN,Math.max(1,Math.round(iv*1.2))*D,Math.max(1,Math.round(iv*ease))*D,Math.max(1,Math.round(iv*ease*1.3))*D];
 }}
function buildStudy(){const {q}=queue();
 if(!q.length){const nd=nextDue();document.getElementById('study').innerHTML=`<div class="done">✅ Şimdilik bitti!<br>${nd?('Sonraki tekrar: '+nd):'Yeni kart limiti doldu ya da bu seviye tamam.'}</div>`+settingsRow();return;}
 cur=q[0];flipped=false;render();}
function nextDue(){const a=pool().map(d=>st(d.w)).filter(s=>s&&s.due>Date.now()).map(s=>s.due).sort((a,b)=>a-b);
 if(!a.length)return null;return new Date(a[0]).toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});}
function settingsRow(){return `<div class="row2">
 <span class="seg"><button class="${meta.algo==='fsrs'?'on':''}" onclick="setAlgo('fsrs')">FSRS</button><button class="${meta.algo==='sm2'?'on':''}" onclick="setAlgo('sm2')">SM-2</button></span>
 ${meta.algo==='fsrs'?`hedef hatırlama: <input type="number" step="0.05" min="0.7" max="0.98" value="${meta.ret}" onchange="meta.ret=clamp(+this.value||0.9,0.7,0.98);saveMeta();render&&flipped&&render();build()">`:''}
 yeni/gün: <input type="number" min="0" value="${meta.newLimit}" onchange="meta.newLimit=+this.value||0;saveMeta();build()">
 <button class="reset" onclick="toggleExtra()">${extra?'⏹ Ekstra: bitir':'⚡ Ekstra çalışma'}</button> <button class="reset" onclick="reset()">Sıfırla</button></div>`;}
function setAlgo(a){meta.algo=a;saveMeta();build()}
function toggleExtra(){extra=!extra;setTab('study');}
function render(){const s=st(cur.w);
 const badge=`<span class="badge" style="background:${LVLC[cur.l]}">${cur.l}</span>`;
 const front=`<div class="word">${cur.w}</div>${badge}<div class="hint">Dokun / boşluk = çevir</div>`;
 const back=`<div class="word">${cur.w}</div>${badge}<div class="mean">${cur.m}</div><div class="meta">Frekans: ${cur.f} · ${cur.e} sınavda</div>`;
 let ctrl;
 if(!flipped){ctrl=`<div class="btns4"><button class="flip" onclick="flip()">Çevir (boşluk)</button></div>`;}
 else{const pv=preview(s);ctrl=`<div class="btns4">
   <button class="again" onclick="ans(1)">Tekrar<small>${fmt(pv[0])}</small></button>
   <button class="hard" onclick="ans(2)">Zor<small>${fmt(pv[1])}</small></button>
   <button class="good" onclick="ans(3)">İyi<small>${fmt(pv[2])}</small></button>
   <button class="easy" onclick="ans(4)">Kolay<small>${fmt(pv[3])}</small></button></div>`;}
 document.getElementById('study').innerHTML=`<div class="flash" onclick="flip()">${flipped?back:front}</div>`+ctrl+settingsRow();}
function flip(){flipped=!flipped;render()}
function ans(G){const w=cur.w,now=Date.now();let s=st(w);
 if(meta.algo==='fsrs'){
   if(!s||s.ph==='new'||s.S===undefined){meta.newCount++;saveMeta();
     const Dv=fD0(G),S=fS0(G);
     if(G===1)s={sch:'fsrs',D:Dv,S:S,reps:1,lapses:1,ph:'learning',last:now,due:now+10*MIN};
     else s={sch:'fsrs',D:Dv,S:S,reps:1,lapses:0,ph:'review',last:now,due:now+fI(S)*D};
   } else {
     const t=Math.max(0,(now-(s.last||now))/D),r=fR(t,s.S);const nD=fnextD(s.D,G);
     if(G===1){s.S=fSf(s.D,s.S,r);s.lapses=(s.lapses||0)+1;s.ph='learning';s.due=now+10*MIN;}
     else{s.S=fSs(s.D,s.S,r,G);s.ph='review';s.due=now+fI(s.S)*D;}
     s.D=nD;s.reps=(s.reps||0)+1;s.last=now;
   }
 } else { // SM-2
   if(!s||s.ease===undefined){s={ph:'new',ease:2.5,iv:0,due:0,reps:0,lapses:0,step:0};}
   if(s.ph==='new'){s.ph='learning';s.step=0;meta.newCount++;saveMeta();}
   if(s.ph==='learning'||s.ph==='relearning'){const steps=s.ph==='relearning'?RELEARN:LEARN;
     if(G===1){s.step=0;s.due=now+steps[0]*MIN;}
     else if(G===4){s.ph='review';s.iv=EASY_GRAD;s.due=now+s.iv*D;s.reps++;}
     else{const ni=s.step+1;if(ni>=steps.length){s.ph='review';s.iv=GRAD;s.due=now+s.iv*D;s.reps++;}else{s.step=ni;s.due=now+steps[ni]*MIN;}}
   } else {
     if(G===1){s.lapses++;s.ease=Math.max(1.3,s.ease-0.2);s.ph='relearning';s.step=0;s.iv=Math.max(1,Math.round(s.iv*0.5));s.due=now+RELEARN[0]*MIN;}
     else{if(G===2){s.ease=Math.max(1.3,s.ease-0.15);s.iv=Math.max(1,Math.round(s.iv*1.2));}
          else if(G===3){s.iv=Math.max(1,Math.round(s.iv*s.ease));}
          else{s.ease+=0.15;s.iv=Math.max(1,Math.round(s.iv*s.ease*1.3));}
          s.reps++;s.due=now+s.iv*D;}
   }
 }
 prog[w]=s;save();meta.doneCount++;saveMeta();buildStudy();build();}
function buildStats(){const p=pool();let nw=0,lrn=0,rev=0,mat=0;
 p.forEach(d=>{const s=st(d.w);if(isNew(d))nw++;else if(s.ph==='review'){rev++;if(curInterval(s)>=21)mat++;}else lrn++;});
 document.getElementById('stats').innerHTML=`<table>
  <tr><td>Algoritma</td><td class="w">${meta.algo.toUpperCase()}${meta.algo==='fsrs'?' (hedef '+Math.round(meta.ret*100)+'%)':''}</td></tr>
  <tr><td>Bugün çalışılan</td><td class="w">${meta.doneCount}</td></tr>
  <tr><td>Bugün yeni kart</td><td class="w">${meta.newCount} / ${meta.newLimit}</td></tr>
  <tr><td>Yeni</td><td class="w" style="color:#38bdf8">${nw}</td></tr>
  <tr><td>Öğrenme</td><td class="w" style="color:#f97316">${lrn}</td></tr>
  <tr><td>Tekrar</td><td class="w" style="color:#22c55e">${rev}</td></tr>
  <tr><td>Olgun (aralık ≥ 21 gün)</td><td class="w">${mat}</td></tr>
  <tr><td>Toplam (bu seviye)</td><td class="w">${p.length}</td></tr></table>`+settingsRow();}
function buildList(p){document.getElementById('list').innerHTML=`<input class="search" placeholder="Ara..." oninput="filterList(this.value)"><div id="rows"></div>`;rowsHtml(p);}
function rowsHtml(p){document.getElementById('rows').innerHTML=`<table>`+p.slice(0,1200).map(d=>{const s=st(d.w);
  const tag=isNew(d)?'':(s.ph==='review'?(curInterval(s)>=21?'✓':'●'):'…');
  return `<tr><td class="w">${d.w}</td><td>${d.m}</td><td><span class="lv" style="background:${LVLC[d.l]}">${d.l}</span></td><td style="color:var(--mut)">${d.f}</td><td>${tag}</td></tr>`}).join('')+`</table>`+(p.length>1200?`<div class="done">İlk 1200 gösteriliyor.</div>`:'');}
function filterList(q){q=q.toLowerCase().trim();rowsHtml(pool().filter(d=>!q||d.w.toLowerCase().includes(q)||d.m.toLowerCase().includes(q)));}
function reset(){if(confirm('Tüm ilerleme ve istatistik silinsin mi?')){prog={};meta={date:today(),newCount:0,doneCount:0,newLimit:meta.newLimit,algo:meta.algo,ret:meta.ret};save();saveMeta();build()}}
document.addEventListener('keydown',e=>{if(tab!=='study')return;if(e.code==='Space'){e.preventDefault();flip()}else if(flipped&&['1','2','3','4'].includes(e.key))ans(+e.key)});
